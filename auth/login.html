<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/app.css">
</head>

<body class="d-flex align-items-center justify-content-center" style="min-height:100vh;background:#f8fafc;">

<div class="hero-card p-4" style="width:420px;max-width:95%;">
  <h3 class="fw-bold mb-3">Login</h3>

  <form id="loginForm">
    <input class="form-control mb-2" type="email" placeholder="Email" id="email" required>
    <input class="form-control mb-3" type="password" placeholder="Password" id="password" required>

    <button class="btn btn-glow w-100">Login</button>
  </form>

  <p class="tiny-hint mt-3 text-center">
    New user?
    <a href="register.html" class="fw-bold">Create account</a>
  </p>
</div>

<script type="module" src="../../assets/js/pages/auth/login.page.js"></script>
</body>
</html>
